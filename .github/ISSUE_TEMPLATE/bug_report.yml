name: Bug report
description: Report a reproducible product bug in the public repository or deployed app.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Do not use this form for vulnerability disclosure. Use the contact details in SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Clear description of the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact sequence that reproduces the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Node, browser, or deployment context.
      placeholder: Ubuntu 24.04, Python 3.12, Node 20, Chrome 136
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only safe, sanitized snippets.