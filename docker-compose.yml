version: '3.8'

services:
  # Redis for Celery message broker
  redis:
    image: redis:7-alpine
    container_name: bugbounty-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bugbounty-network

  # Django web application
  web:
    build: .
    image: bugbounty-arsenal-web
    container_name: bugbounty-web
    ports:
      - "8001:8001"
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      # Persistent data
      - ./bugbounty_arsenal.db:/app/bugbounty_arsenal.db
      - ./recon_output:/app/recon_output
      - ./scan_progress:/app/scan_progress
      - ./screenshots:/app/screenshots
      - ./bug_evidence:/app/bug_evidence
      - ./reports:/app/reports
      - ./recon_results:/app/recon_results
      - ./raw_responses:/app/raw_responses
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./cvelistV5:/app/cvelistV5
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - ENVIRONMENT=production
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SECURE_SSL_REDIRECT=False
      - PAID_PLANS_ENABLED=${PAID_PLANS_ENABLED:-False}
      - SMS_VERIFICATION_ENABLED=${SMS_VERIFICATION_ENABLED:-True}
      - ENTERPRISE_VERIFICATION_ENABLED=${ENTERPRISE_VERIFICATION_ENABLED:-False}
      - IPWHOIS_SECURITY_ENABLED=${IPWHOIS_SECURITY_ENABLED:-False}
      - DATABASE_URL=sqlite:///./bugbounty_arsenal.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM_EMAIL=${EMAIL_FROM_EMAIL:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-BugBounty Arsenal}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME:-BugBounty Arsenal}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TWILIO_ENABLED=${TWILIO_ENABLED:-False}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - SUBFINDER_BIN=/usr/local/bin/subfinder
      - AMASS_BIN=/usr/local/bin/amass
      - HTTPX_BIN=/usr/local/bin/httpx
      - KATANA_BIN=/usr/local/bin/katana
      - DALFOX_BIN=/usr/local/bin/dalfox
      - FFUF_BIN=/usr/local/bin/ffuf
      - NMAP_BIN=/usr/bin/nmap
      - CVE_DB_PATH=${CVE_DB_PATH:-/app/cvelistV5/cves}
      - NUCLEI_TEMPLATES=${NUCLEI_TEMPLATES:-/app/nuclei-templates}
      - ADMIN_URL=${ADMIN_URL:-admin}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/schema/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bugbounty-network

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8001/api}
        - REACT_APP_TURNSTILE_ENABLED=${REACT_APP_TURNSTILE_ENABLED:-false}
        - REACT_APP_TURNSTILE_SITE_KEY=${REACT_APP_TURNSTILE_SITE_KEY:-}
        - REACT_APP_ENABLE_WS=${REACT_APP_ENABLE_WS:-true}
    container_name: bugbounty-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8001/api}
      - REACT_APP_TURNSTILE_ENABLED=${REACT_APP_TURNSTILE_ENABLED:-false}
      - REACT_APP_TURNSTILE_SITE_KEY=${REACT_APP_TURNSTILE_SITE_KEY:-}
      - REACT_APP_ENABLE_WS=${REACT_APP_ENABLE_WS:-true}
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - bugbounty-network

  # Celery worker for async tasks
  celery:
    image: bugbounty-arsenal-web
    container_name: bugbounty-celery
    command: celery -A config worker --loglevel=info --concurrency=4
    healthcheck:
      disable: true
    volumes:
      # Same volumes as web for file access
      - ./bugbounty_arsenal.db:/app/bugbounty_arsenal.db
      - ./recon_output:/app/recon_output
      - ./scan_progress:/app/scan_progress
      - ./screenshots:/app/screenshots
      - ./bug_evidence:/app/bug_evidence
      - ./reports:/app/reports
      - ./recon_results:/app/recon_results
      - ./raw_responses:/app/raw_responses
      - ./cvelistV5:/app/cvelistV5
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - ENVIRONMENT=production
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - SECURE_SSL_REDIRECT=False
      - PAID_PLANS_ENABLED=${PAID_PLANS_ENABLED:-False}
      - SMS_VERIFICATION_ENABLED=${SMS_VERIFICATION_ENABLED:-True}
      - ENTERPRISE_VERIFICATION_ENABLED=${ENTERPRISE_VERIFICATION_ENABLED:-False}
      - IPWHOIS_SECURITY_ENABLED=${IPWHOIS_SECURITY_ENABLED:-False}
      - DATABASE_URL=sqlite:///./bugbounty_arsenal.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUBFINDER_BIN=/usr/local/bin/subfinder
      - AMASS_BIN=/usr/local/bin/amass
      - HTTPX_BIN=/usr/local/bin/httpx
      - KATANA_BIN=/usr/local/bin/katana
      - DALFOX_BIN=/usr/local/bin/dalfox
      - FFUF_BIN=/usr/local/bin/ffuf
      - NMAP_BIN=/usr/bin/nmap
      - CVE_DB_PATH=${CVE_DB_PATH:-/app/cvelistV5/cves}
      - NUCLEI_TEMPLATES=${NUCLEI_TEMPLATES:-/app/nuclei-templates}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bugbounty-network

  # Celery Beat for scheduled tasks (optional)
  celery-beat:
    image: bugbounty-arsenal-web
    container_name: bugbounty-celery-beat
    command: celery -A config beat --loglevel=info
    healthcheck:
      disable: true
    volumes:
      - ./bugbounty_arsenal.db:/app/bugbounty_arsenal.db
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - ENVIRONMENT=production
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - SECURE_SSL_REDIRECT=False
      - PAID_PLANS_ENABLED=${PAID_PLANS_ENABLED:-False}
      - SMS_VERIFICATION_ENABLED=${SMS_VERIFICATION_ENABLED:-True}
      - ENTERPRISE_VERIFICATION_ENABLED=${ENTERPRISE_VERIFICATION_ENABLED:-False}
      - IPWHOIS_SECURITY_ENABLED=${IPWHOIS_SECURITY_ENABLED:-False}
      - DATABASE_URL=sqlite:///./bugbounty_arsenal.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUBFINDER_BIN=/usr/local/bin/subfinder
      - AMASS_BIN=/usr/local/bin/amass
      - HTTPX_BIN=/usr/local/bin/httpx
      - KATANA_BIN=/usr/local/bin/katana
      - DALFOX_BIN=/usr/local/bin/dalfox
      - FFUF_BIN=/usr/local/bin/ffuf
      - NMAP_BIN=/usr/bin/nmap
      - CVE_DB_PATH=${CVE_DB_PATH:-/app/cvelistV5/cves}
      - NUCLEI_TEMPLATES=${NUCLEI_TEMPLATES:-/app/nuclei-templates}
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bugbounty-network

  # Nginx reverse proxy (80/443)
  nginx:
    image: nginx:alpine
    container_name: bugbounty-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - frontend
    restart: unless-stopped
    networks:
      - bugbounty-network

  # Certbot for Let's Encrypt SSL (auto-renewal)
  certbot:
    image: certbot/certbot
    container_name: bugbounty-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - bugbounty-network

volumes:
  redis_data:
    driver: local

networks:
  bugbounty-network:
    driver: bridge
